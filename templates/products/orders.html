{% extends 'base_premium.html' %}
{% load static %}

{% block title %}My Orders - ETH Imports{% endblock %}

{% block content %}
<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
    <h1 class="text-3xl font-bold text-gray-900 mb-6">My Orders</h1>
    <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-8 text-center">
        <div class="mb-6">
            <i class="fas fa-box-open text-6xl text-gray-300 mb-4"></i>
            <p class="text-gray-500 text-lg">No orders yet</p>
            <p class="text-gray-400 text-sm">Your orders will appear here once you make a purchase</p>
        </div>
        <a href="{% url 'products:product_list' %}" class="btn btn-primary">
            <i class="fas fa-shopping-bag mr-2"></i> Start Shopping
        </a>
    </div>
</div>
{% endblock %}
